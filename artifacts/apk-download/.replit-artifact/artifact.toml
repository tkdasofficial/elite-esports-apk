kind = "web"
previewPath = "/"
title = "APK Download Page"
version = "1.0.0"
id = "artifacts/apk-download"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20984

[services.development]
run = "pnpm --filter @workspace/apk-download run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/apk-download", "run", "build" ]
publicDir = "artifacts/apk-download/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20984"
BASE_PATH = "/"
